{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرحباً بك في SYRA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Cairo', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .welcome-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 500px; width: 90%; }
        .icon-box { font-size: 4rem; color: #e63946; margin-bottom: 20px; }
        .btn-activate { background-color: #e63946; color: white; border-radius: 10px; padding: 12px 30px; font-weight: bold; font-size: 1.1rem; text-decoration: none; display: inline-block; transition: 0.3s; }
        .btn-activate:hover { background-color: #c12e3a; color: white; transform: translateY(-2px); }
        .bracelet-id { background: #eee; padding: 5px 15px; border-radius: 50px; font-family: monospace; color: #555; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="welcome-card">
    <div class="icon-box">🎉</div>
    <h2 class="fw-bold mb-3">مبروك على سوارك الجديد!</h2>
    <p class="text-muted mb-4">لقد قمت بمسح السوار بنجاح. هذا السوار غير مرتبط بأي حساب حالياً. اضغط على الزر أدناه لإنشاء حسابك وتفعيل هويتك الطبية الذكية.</p>
    
    <div class="mb-4">
        <span class="bracelet-id">معرف السوار: {{ bracelet_id }}</span>
    </div>

    <a href="{% url 'activate' %}" class="btn btn-activate">ابدأ التفعيل الآن</a>
    
    <p class="mt-4 small text-muted">SYRA - هويتك الطبية معك دائماً</p>
</div>

</body>
</html>
