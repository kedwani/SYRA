<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}SYRA — Smart Medical ID{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500;700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #060d17;
      --surface: #0b1827;
      --card:    #0e1f33;
      --border:  #132840;
      --green:   #00e87a;
      --blue:    #1a8cff;
      --red:     #ff3b5c;
      --amber:   #ffaa00;
      --text:    #cde3f5;
      --muted:   #4a7090;
      --white:   #eef6ff;
      --display: 'Syne', sans-serif;
      --mono:    'IBM Plex Mono', monospace;
      --body:    'Outfit', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);
      pointer-events: none; z-index: 9999;
    }

    /* ── Nav ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center;
      padding: 0 40px; height: 58px;
      background: rgba(6,13,23,.94);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: var(--display); font-size: 22px; font-weight: 800;
      color: var(--green); letter-spacing: .04em;
      text-decoration: none; margin-right: 36px;
      text-shadow: 0 0 28px rgba(0,232,122,.4);
    }
    .nav-logo em { color: var(--text); font-style: normal; }
    .ecg-wrap { width: 72px; height: 22px; overflow: hidden; margin-right: 28px; }
    .ecg-wrap svg { animation: ecg 2.4s linear infinite; }
    @keyframes ecg { from{transform:translateX(0)} to{transform:translateX(-50%)} }
    .nav-links { display: flex; gap: 2px; }
    .nav-links a {
      padding: 6px 14px; color: var(--muted);
      font-size: 13px; font-weight: 500;
      text-decoration: none; border-radius: 6px;
      transition: all .18s;
    }
    .nav-links a:hover { color: var(--text); background: rgba(255,255,255,.04); }
    .nav-links a.active { color: var(--green); }
    .nav-right { margin-left: auto; display: flex; gap: 10px; align-items: center; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 20px; border-radius: 8px;
      font-family: var(--body); font-size: 13px; font-weight: 500;
      cursor: pointer; border: none; text-decoration: none;
      transition: all .18s;
    }
    .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--muted); background: rgba(255,255,255,.03); }
    .btn-primary { background: var(--green); color: #030a10; font-weight: 600; }
    .btn-primary:hover { background: #18ffaa; box-shadow: 0 0 22px rgba(0,232,122,.4); }
    .btn-danger { background: rgba(255,59,92,.1); color: var(--red); border: 1px solid rgba(255,59,92,.25); }
    .btn-danger:hover { background: rgba(255,59,92,.18); }
    .btn-blue { background: rgba(26,140,255,.15); color: var(--blue); border: 1px solid rgba(26,140,255,.3); }
    .btn-blue:hover { background: rgba(26,140,255,.25); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }

    /* ── Cards ── */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 24px; }

    /* ── Forms ── */
    .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .form-group label { font-size: 10px; font-weight: 500; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
    .form-group input,
    .form-group select,
    .form-group textarea {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px;
      color: var(--white); font-family: var(--body); font-size: 14px;
      outline: none; transition: border-color .18s, box-shadow .18s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(0,232,122,.09);
    }
    .form-group textarea { resize: vertical; min-height: 72px; }
    .form-group select option { background: var(--card); }

    /* ── Alert ── */
    .alert { padding: 10px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; display: none; }
    .alert.show { display: block; }
    .alert-error   { background: rgba(255,59,92,.09); border:1px solid rgba(255,59,92,.3); color:#ff7090; }
    .alert-success { background: rgba(0,232,122,.07); border:1px solid rgba(0,232,122,.25); color: var(--green); }

    /* ── Badges ── */
    .badge { display:inline-block; padding:2px 10px; border-radius:20px; font-size:11px; font-weight:600; font-family:var(--mono); letter-spacing:.06em; }
    .badge-green { background:rgba(0,232,122,.1); color:var(--green); border:1px solid rgba(0,232,122,.2); }
    .badge-red   { background:rgba(255,59,92,.1);  color:var(--red);   border:1px solid rgba(255,59,92,.2); }
    .badge-blue  { background:rgba(26,140,255,.1); color:var(--blue);  border:1px solid rgba(26,140,255,.2); }
    .badge-amber { background:rgba(255,170,0,.1);  color:var(--amber); border:1px solid rgba(255,170,0,.2); }

    /* ── Toast ── */
    #toast {
      position:fixed; bottom:28px; right:28px; z-index:9000;
      padding:12px 20px; border-radius:10px;
      font-size:13px; font-family:var(--mono);
      opacity:0; transform:translateY(8px);
      transition:all .3s; pointer-events:none;
    }
    #toast.show { opacity:1; transform:translateY(0); }
    #toast.ok  { background:rgba(0,232,122,.14); border:1px solid var(--green); color:var(--green); }
    #toast.err { background:rgba(255,59,92,.14); border:1px solid var(--red); color:var(--red); }

    /* ── Spinner ── */
    .spinner { width:16px; height:16px; border:2px solid rgba(255,255,255,.1); border-top-color:var(--green); border-radius:50%; animation:spin .55s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* ── Utils ── */
    .mono { font-family: var(--mono); }
    .muted { color: var(--muted); }
    .mt-8  { margin-top:8px; }
    .mt-16 { margin-top:16px; }
    .mt-24 { margin-top:24px; }
    .divider { height:1px; background:var(--border); margin:20px 0; }

    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

<nav>
  <a href="/" class="nav-logo">SY<em>R</em>A</a>
  <div class="ecg-wrap" aria-hidden="true">
    <svg viewBox="0 0 144 22" width="144" height="22" fill="none">
      <polyline points="0,11 18,11 23,3 27,19 31,3 35,19 40,11 72,11 90,11 95,3 99,19 103,3 107,19 112,11 144,11"
        stroke="#00e87a" stroke-width="1.4" stroke-linejoin="round" opacity=".55"/>
    </svg>
  </div>
  <div class="nav-links">
    <a href="/" id="navHome">Home</a>
    <a href="/dashboard/" id="navDash" style="display:none;">Dashboard</a>
  </div>
  <div class="nav-right">
    <div id="guestNav" style="display:flex;gap:8px;">
      <a href="/login/"    class="btn btn-ghost" style="font-size:13px;padding:6px 16px;">Sign In</a>
      <a href="/register/" class="btn btn-primary" style="font-size:13px;padding:6px 16px;">Get Started</a>
    </div>
    <div id="authNav" style="display:none;align-items:center;gap:12px;">
      <span class="mono muted" id="navUsername" style="font-size:12px;"></span>
      <button class="btn btn-ghost" onclick="logout()" style="font-size:12px;padding:5px 14px;">Sign Out</button>
    </div>
  </div>
</nav>

{% block content %}{% endblock %}

<div id="toast"></div>

<script>
const API = '';
function getToken()    { return localStorage.getItem('syra_token'); }
function getUsername() { return localStorage.getItem('syra_username'); }

function setAuth(token, username) {
  localStorage.setItem('syra_token', token);
  localStorage.setItem('syra_username', username);
  updateNav();
}
function logout() {
  localStorage.removeItem('syra_token');
  localStorage.removeItem('syra_username');
  window.location.href = '/login/';
}
function updateNav() {
  const token = getToken(), user = getUsername();
  const guest = document.getElementById('guestNav');
  const auth  = document.getElementById('authNav');
  const dash  = document.getElementById('navDash');
  const uname = document.getElementById('navUsername');
  if (token && user) {
    guest.style.display = 'none';
    auth.style.display  = 'flex';
    dash.style.display  = 'block';
    uname.textContent   = `@${user}`;
  } else {
    guest.style.display = 'flex';
    auth.style.display  = 'none';
    dash.style.display  = 'none';
  }
}
async function apiFetch(path, opts = {}) {
  const token = getToken();
  const headers = { ...(opts.headers || {}) };
  if (!(opts.body instanceof FormData)) headers['Content-Type'] = 'application/json';
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(API + path, { ...opts, headers });
  return res;
}
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `show ${type}`;
  setTimeout(() => { el.className = type; }, 2800);
}
function requireAuth() {
  if (!getToken()) { window.location.href = '/login/'; return false; }
  return true;
}
updateNav();
</script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
